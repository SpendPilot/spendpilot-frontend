name: Frontend CI and Publish to ACR

on:
  push:
    branches:
      - main

  # Allows you to test the workflow manually.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_FRONTEND_REPOSITORY || 'spend-control-frontend' }}
  IMAGE_TAG: sha-${{ github.sha }}
  GITOPS_REPOSITORY: SpendPilot/spendpilot-gitops
  GITOPS_VALUES_FILE: environments/prod/values/spendpilot-values.yaml

jobs:
  validate:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

  docker:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.title=SpendPilot Frontend
            org.opencontainers.image.description=SpendPilot frontend container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "Published image:"
          echo "${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update production frontend image tag
        working-directory: gitops
        run: |
          yq -i '.frontend.image.tag = strenv(IMAGE_TAG)' "${{ env.GITOPS_VALUES_FILE }}"
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push GitOps promotion
        working-directory: gitops
        run: |
          if git diff --quiet -- "${{ env.GITOPS_VALUES_FILE }}"; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GITOPS_VALUES_FILE }}"
          git commit -m "Promote frontend image to ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

#sass

